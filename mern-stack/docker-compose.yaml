version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mernappdb
      MYSQL_USER: mernuser
      MYSQL_PASSWORD: mernpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    depends_on:
      - mysql-db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql-db
      PMA_USER: mernuser
      PMA_PASSWORD: mernpassword
    # healthcheck temporarily removed

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: pgdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d pgdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin4:
    image: dpage/pgadmin4
    container_name: pgadmin4
    depends_on:
      - postgres-db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    # healthcheck temporarily removed

  backend-api:
    &backend-api
    build:
      context: ./backend
    environment:
      DB_HOST: mysql-db
      DB_USER: mernuser
      DB_PASSWORD: mernpassword
      DB_DATABASE: mernappdb
      DB_TABLENAME: users
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "3000"

  backend-api-1:
    <<: *backend-api
    container_name: backend-api-1

  backend-api-2:
    <<: *backend-api
    container_name: backend-api-2

  frontend-app:
    build:
      context: ./frontend
      target: build
    container_name: frontend-app
    depends_on:
      - backend-api
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5000:5000"

  loadbalancer:
    image: nginx:latest
    container_name: loadbalancer
    ports:
      - "4000:80"
    depends_on:
      - backend-api-1
      - backend-api-2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql_data:
  pgdata:
  pgadmin_data:
